paths:
  include:
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.java"
    - "**/*.go"
    - "**/*.rs"
  exclude:
    - ".git/**"
    - ".codemosaic/**"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - "coverage/**"
identifiers:
  enabled: true
  preserve:
    - self
    - cls
    - __name__
    - main
strings:
  enabled: true
  redact_patterns:
    - url
    - email
    - phone
    - secret
comments:
  mode: placeholder
workspace:
  copy_unmatched: false
mapping:
  require_encryption: false
  encryption_provider: managed-v1
  key_management:
    key_id: team-dev-2026q1
    registry_file: ./.codemosaic/key-registry.json
  rules:
    src/secret/**:
      require_encryption: true
      encryption_provider: managed-v1
    tests/fixtures/**:
      require_encryption: false
leakage:
  max_total_score: 20
  max_file_score: 8
  rules:
    src/secret/**:
      max_total_score: 4
      max_file_score: 0
    src/public-sdk/**:
      max_file_score: 16
