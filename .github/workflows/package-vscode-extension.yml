name: Package VS Code Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'extensions/vscode/**'
      - 'scripts/package_vscode_extension.py'
      - '.github/workflows/package-vscode-extension.yml'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Package VSIX
        run: python scripts/package_vscode_extension.py --overwrite
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemosaic-vscode-vsix
          path: dist/*.vsix
